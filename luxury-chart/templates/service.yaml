apiVersion: v1
kind: Service
metadata:
  name: {{ include "luxury-chart.fullname" . }}
  labels:
    {{- include "luxury-chart.labels" . | nindent 4 }}

  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "luxury-chart.selectorLabels" . | nindent 4 }}
